services:
  postgres:
    image: postgres:17-alpine
    container_name: agenticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: helpdesk
    ports:
      - "5432:5432"
    volumes:
      - agenticket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d helpdesk"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  agenticket_pgdata:
